<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глина — вы записаны</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="success">
  <header class="topbar">
    <div class="topbar__inner">
      <span class="logo">🏺 Глина</span>
    </div>
  </header>

  <main class="container container--narrow">
    <section class="success">
      <div class="success__icon">✅</div>
      <h1 class="success__title">Вы записаны!</h1>
      <p class="success__text">
        <b id="success-name">Гость</b>, ждём вас на занятии
        «<span id="success-program">занятие</span>».
      </p>
      <ul class="success__facts">
        <li>🗓️ <span id="success-when">—</span></li>
        <li>🧰 <span id="success-rental">—</span></li>
      </ul>
      <p class="success__hint">Оплата на месте — наличными или переводом. До встречи в мастерской!</p>
      <a class="btn btn--primary btn--block" href="index.html">К расписанию</a>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
