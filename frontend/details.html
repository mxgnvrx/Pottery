<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глина — детали занятия</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="details">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="logo" href="index.html"><span class="logo__mark">🏺</span>Глина</a>
      <nav class="nav">
        <a href="index.html" class="nav__link">Расписание</a>
        <a href="masters.html" class="nav__link">Мастера</a>
        <a href="bookings.html" class="nav__link">Мои записи</a>
      </nav>
    </div>
  </header>

  <main class="container container--narrow">
    <div id="error-box" class="alert alert--error" hidden></div>

    <section id="slot-details" class="detail">
      <p class="muted">Загрузка…</p>
    </section>

    <div id="unavailable" class="alert alert--warn" hidden style="margin-top:18px"></div>

    <form id="booking-form" class="form" hidden>
      <h2 class="form__title">Записаться на занятие</h2>

      <label class="field">
        <span class="field__label">Имя</span>
        <input id="name" class="field__input" type="text" placeholder="Как вас зовут?" required>
      </label>

      <label class="field">
        <span class="field__label">Телефон</span>
        <input id="phone" class="field__input" type="tel" placeholder="+7 900 000-00-00" required>
      </label>

      <label class="rental-option">
        <input id="rental" type="checkbox">
        <span class="rental-option__text">Взять напрокат инструменты и фартук</span>
        <span class="rental-option__price">+400 ₽</span>
      </label>

      <button id="submit-btn" type="submit" class="btn btn--primary btn--block">
        Подтвердить запись
      </button>
    </form>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">🏺 Глина</span>
      <div class="footer__meta">
        г. Москва, ул. Гончарная, д. 12<br>
        ежедневно 10:00–21:00 · оплата на месте
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
