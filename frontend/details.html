<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глина — детали занятия</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="details">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="back" href="index.html">← Назад</a>
      <span class="logo">🏺 Глина</span>
    </div>
  </header>

  <main class="container container--narrow">
    <div id="error-box" class="alert alert--error" hidden></div>

    <section id="slot-details" class="detail">
      <p class="empty">Загрузка…</p>
    </section>

    <div id="unavailable" class="alert alert--warn" hidden></div>

    <form id="booking-form" class="form" hidden>
      <h2 class="form__title">Записаться на занятие</h2>

      <label class="field">
        <span class="field__label">Имя</span>
        <input id="name" class="field__input" type="text" placeholder="Как вас зовут?" required>
      </label>

      <label class="field">
        <span class="field__label">Телефон</span>
        <input id="phone" class="field__input" type="tel" placeholder="+7 ..." required>
      </label>

      <label class="checkbox">
        <input id="rental" type="checkbox">
        <span>Взять напрокат инструменты и фартук</span>
      </label>

      <button type="submit" class="btn btn--primary btn--block">Подтвердить запись</button>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
