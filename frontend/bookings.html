<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глина — мои записи</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="bookings">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="logo" href="index.html"><span class="logo__mark">🏺</span>Глина</a>
      <nav class="nav">
        <a href="index.html" class="nav__link">Расписание</a>
        <a href="masters.html" class="nav__link">Мастера</a>
        <a href="bookings.html" class="nav__link nav__link--active">Мои записи</a>
      </nav>
    </div>
  </header>

  <main class="container container--narrow">
    <h1 class="page-title">Мои записи</h1>
    <p class="page-hint">Введите телефон, который указывали при записи</p>

    <form id="phone-form" class="phone-form">
      <input id="phone-input" class="field__input" type="tel"
             placeholder="+7 900 000-00-00" autocomplete="tel">
      <button type="submit" class="btn btn--primary">Найти</button>
    </form>

    <div id="error-box" class="alert alert--error" hidden></div>

    <div id="empty-state" class="empty" hidden>
      <div class="empty__icon">🫖</div>
      <p class="empty__title">Записей не найдено</p>
      <p class="empty__text">По этому номеру пока ничего нет —
        <a href="index.html">выберите занятие в расписании</a>.</p>
    </div>

    <div id="bookings" class="bookings-list"></div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">🏺 Глина</span>
      <div class="footer__meta">
        г. Москва, ул. Гончарная, д. 12<br>
        ежедневно 10:00–21:00 · оплата на месте
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
