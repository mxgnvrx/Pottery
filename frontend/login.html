<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глина — вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="logo" href="index.html"><span class="logo__mark">🏺</span>Глина</a>
      <nav class="nav">
        <a href="index.html" class="nav__link">Расписание</a>
        <a href="masters.html" class="nav__link">Мастера</a>
        <a href="bookings.html" class="nav__link">Мои записи</a>
      </nav>
    </div>
  </header>

  <main class="container container--narrow">
    <h1 class="page-title">Вход в аккаунт</h1>
    <p class="page-hint">Клиенту — чтобы видеть свои записи. Владельцу — для админки.</p>

    <div id="error-box" class="alert alert--error" hidden></div>

    <form id="login-form" class="form">
      <label class="field">
        <span class="field__label">Логин</span>
        <input id="login" class="field__input" type="text" placeholder="admin / client" required>
      </label>
      <label class="field">
        <span class="field__label">Пароль</span>
        <input id="password" class="field__input" type="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="btn btn--primary btn--block">Войти</button>
    </form>

    <div class="demo-accounts">
      <p class="demo-accounts__title">Демо-аккаунты (нажмите, чтобы подставить):</p>
      <button class="demo-chip" data-demo="admin:admin123">
        <b>Владелец</b><span>admin / admin123</span>
      </button>
      <button class="demo-chip" data-demo="client:client123">
        <b>Клиент</b><span>client / client123</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">🏺 Глина</span>
      <div class="footer__meta">
        г. Москва, ул. Гончарная, д. 12<br>
        ежедневно 10:00–21:00 · оплата на месте
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
