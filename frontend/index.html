<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глина — расписание занятий</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="schedule">
  <header class="topbar">
    <div class="topbar__inner">
      <span class="logo">🏺 Глина</span>
      <span class="topbar__sub">Запись на мастер-классы</span>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Ближайшие занятия</h1>
    <p class="page-hint">Расписание на 7 дней вперёд</p>

    <div id="error-box" class="alert alert--error" hidden></div>

    <div id="empty-state" class="empty" hidden>
      <div class="empty__icon">🗓️</div>
      <p class="empty__title">Пока нет доступных занятий</p>
      <p class="empty__text">Загляните позже — мастера скоро добавят новые слоты.</p>
    </div>

    <section id="slots" class="slots"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
